name = "toolzai-telegram-bot"
main = "src/worker.js"
compatibility_date = "2026-07-15"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "digital_product_bot"
database_id = "00000000-0000-0000-0000-000000000000"

[vars]
QUANTUM_VAULT_BASE_URL = "https://your-seller-api.example"
BINANCE_PAY_ID = "your-binance-pay-id"
BINANCE_USDT_TO_BDT_RATE = "121"
FIREBASE_PROJECT_ID = "your-firebase-project-id"
FIREBASE_PAYMENT_COLLECTION = "payments"
ADMIN_IDS = "123456789"
SUPPORT_URL = "https://t.me/your_support_username"
REQUIRED_CHANNEL = "@your_channel"
REQUIRED_CHANNEL_URL = "https://t.me/your_channel"
