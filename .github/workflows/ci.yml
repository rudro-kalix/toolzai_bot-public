name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare-worker/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx wrangler deploy --dry-run --config wrangler.example.toml

  manager:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: manager/package-lock.json
      - run: npm ci
      - run: npm run build
